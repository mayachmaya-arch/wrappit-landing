<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1200" viewBox="0 0 1920 1200">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78716c"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <pattern id="p" width="28" height="28" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="28" stroke="#ffffff" stroke-opacity="0.15" stroke-width="10"/>
    </pattern>
  </defs>
  <rect width="1920" height="1200" fill="url(#g)"/>
  <rect width="1920" height="1200" fill="url(#p)"/>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#1f2834" fill-opacity="0.45">רחוב, יד מושיטה מתנה עטופה</text>
</svg>
